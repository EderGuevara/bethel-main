<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interés Compuesto — Bethel Financial Group</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#F8FAFC;color:#1E293B;min-height:100vh;padding:1.5rem}
  .page{max-width:860px;margin:0 auto;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.10);overflow:hidden}
  .hdr{background:#0F172A;padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
  .hdr-logo{height:52px;object-fit:contain}
  .hdr-right{text-align:right}
  .hdr-title{color:#DDB84A;font-size:1.1rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
  .hdr-sub{color:#94A3B8;font-size:.72rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
  .action-bar{background:#1E293B;padding:.75rem 2rem;display:flex;gap:.75rem;justify-content:flex-end;align-items:center;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;border:none;transition:.15s;font-family:inherit}
  .btn-gold{background:linear-gradient(135deg,#DDB84A,#8B6914);color:#fff}
  .btn-gold:hover{opacity:.9}
  .btn-outline{background:transparent;border:1.5px solid #DDB84A;color:#DDB84A}
  .btn-outline:hover{background:#DDB84A;color:#0F172A}
  .btn-clear{background:transparent;border:1.5px solid #475569;color:#94A3B8;font-size:.75rem}
  .btn-clear:hover{border-color:#94A3B8;color:#CBD5E1}
  .lang-btn{background:transparent;border:1.5px solid #DDB84A;color:#DDB84A;padding:6px 16px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:700;letter-spacing:1px;transition:all .2s;font-family:inherit}
  .lang-btn:hover{background:#DDB84A;color:#0F172A}
  .body{padding:2rem}
  .inputs-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
  @media(max-width:580px){.inputs-grid{grid-template-columns:1fr}}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:.72rem;font-weight:700;color:#64748B;letter-spacing:.05em;text-transform:uppercase}
  .input-wrap{display:flex;align-items:center;border:1.5px solid #E2E8F0;border-radius:8px;overflow:hidden;background:#F8FAFC;transition:border-color .15s}
  .input-wrap:focus-within{border-color:#DDB84A;box-shadow:0 0 0 3px rgba(221,184,74,.12);background:#fff}
  .prefix{padding:0 10px;font-size:14px;font-weight:700;color:#8B6914;background:#FDF8EC;border-right:1px solid #E2E8F0;line-height:38px}
  .suffix{padding:0 12px;font-size:13px;font-weight:700;color:#64748B}
  .input-wrap input,.input-wrap select{flex:1;border:none;padding:9px 12px;font-size:.95rem;color:#1E293B;background:transparent;outline:none;font-family:inherit;min-width:0}
  .full{grid-column:1/-1}
  .results{background:#0F172A;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}
  .results-main{text-align:center;margin-bottom:1.2rem}
  .res-label{font-size:.68rem;font-weight:700;letter-spacing:1.5px;color:#DDB84A;text-transform:uppercase;margin-bottom:.3rem}
  .res-amount{font-size:2.6rem;font-weight:900;color:#fff;letter-spacing:-1px}
  .res-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}
  @media(max-width:500px){.res-grid{grid-template-columns:1fr 1fr}}
  .res-cell{background:rgba(255,255,255,.06);border-radius:8px;padding:.75rem;text-align:center}
  .res-cell-label{font-size:.65rem;font-weight:700;color:#64748B;letter-spacing:.8px;text-transform:uppercase;margin-bottom:.3rem}
  .res-cell-val{font-size:1.05rem;font-weight:800;color:#fff}
  .res-cell-val.gold{color:#DDB84A}
  .table-wrap{border:1.5px solid #E2E8F0;border-radius:10px;overflow:hidden;max-height:260px;overflow-y:auto}
  table{width:100%;border-collapse:collapse;font-size:.82rem}
  thead{background:#0F172A;position:sticky;top:0}
  th{padding:.55rem .9rem;text-align:right;font-size:.68rem;font-weight:700;color:#DDB84A;letter-spacing:.5px;text-transform:uppercase}
  th:first-child{text-align:left}
  td{padding:.5rem .9rem;text-align:right;border-bottom:1px solid #F1F5F9;color:#1E293B}
  td:first-child{text-align:left;font-weight:700;color:#8B6914}
  tr:nth-child(even) td{background:#FAFAFA}
  .empty-row td{text-align:center;color:#94A3B8;padding:1.5rem;font-size:.85rem}
  .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:#0F172A;color:#fff;padding:.6rem 1.4rem;border-radius:24px;font-size:.82rem;font-weight:700;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:999}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .footer{background:#0F172A;padding:.6rem 2rem;text-align:center;font-size:.68rem;color:#475569;letter-spacing:.5px;margin-top:2rem;border-radius:0 0 16px 16px}
</style>
</head>
<body>
<div class="page">
  <div class="hdr">
    <img class="hdr-logo" src="/assets/Logo.JPG" alt="Bethel Financial Group" onerror="this.style.display='none'"/>
    <div class="hdr-right">
      <div class="hdr-title" id="hdrTitle">Calculadora de Interés Compuesto</div>
      <div class="hdr-sub">Bethel Financial Group</div>
    </div>
  </div>
  <div class="action-bar">
    <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN</button>
    <button class="btn btn-clear" onclick="clearAll()" id="clearBtnEl"><span id="clearLbl">🗑 Limpiar</span></button>
    <button class="btn btn-outline" onclick="shareSummary()"><span id="shareLbl">↑ Compartir</span></button>
    <button class="btn btn-gold" onclick="downloadPDF()" id="pdfBtnEl"><span id="pdfLbl">⬇ Descargar PDF</span></button>
  </div>
  <div class="body">
    <div class="inputs-grid">
      <div class="field">
        <label id="lbl_principal">Capital inicial</label>
        <div class="input-wrap"><span class="prefix">$</span><input type="number" id="principal" placeholder="10,000" min="0" step="100" oninput="calc()"/></div>
      </div>
      <div class="field">
        <label id="lbl_rate">Tasa anual de interés</label>
        <div class="input-wrap"><input type="number" id="rate" placeholder="7" min="0" max="100" step="0.1" oninput="calc()"/><span class="suffix">%</span></div>
      </div>
      <div class="field">
        <label id="lbl_years">Años</label>
        <div class="input-wrap"><input type="number" id="years" placeholder="20" min="1" max="50" step="1" oninput="calc()"/></div>
      </div>
      <div class="field">
        <label id="lbl_contrib">Aportación mensual</label>
        <div class="input-wrap"><span class="prefix">$</span><input type="number" id="contrib" placeholder="0" min="0" step="50" oninput="calc()"/></div>
      </div>
      <div class="field full">
        <label id="lbl_freq">Frecuencia de capitalización</label>
        <div class="input-wrap">
          <select id="freq" onchange="calc()">
            <option value="12" id="opt_monthly">Mensual</option>
            <option value="4" id="opt_quarterly">Trimestral</option>
            <option value="2" id="opt_semi">Semestral</option>
            <option value="1" id="opt_annual">Anual</option>
          </select>
        </div>
      </div>
    </div>

    <div class="results">
      <div class="results-main">
        <div class="res-label" id="lbl_finalBal">Balance Final</div>
        <div class="res-amount" id="finalBalance">—</div>
      </div>
      <div class="res-grid">
        <div class="res-cell">
          <div class="res-cell-label" id="lbl_contributed">Total Aportado</div>
          <div class="res-cell-val" id="totalContrib">—</div>
        </div>
        <div class="res-cell">
          <div class="res-cell-label" id="lbl_earned">Interés Ganado</div>
          <div class="res-cell-val gold" id="totalInterest">—</div>
        </div>
        <div class="res-cell">
          <div class="res-cell-label" id="lbl_mult">Multiplicador</div>
          <div class="res-cell-val gold" id="multiplier">—</div>
        </div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th id="th_year">Año</th>
            <th id="th_balance">Balance</th>
            <th id="th_contribs">Aportaciones</th>
            <th id="th_interest">Interés</th>
          </tr>
        </thead>
        <tbody id="tblBody">
          <tr class="empty-row"><td colspan="4" id="emptyMsg">Ingresa los valores para ver la proyección</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div class="footer">BETHEL FINANCIAL GROUP &nbsp;|&nbsp; bethelfinancialgroup.com</div>
</div>
<div class="toast" id="toast"></div>
<script>
const T={
  es:{title:'Calculadora de Interés Compuesto',lbl_principal:'Capital inicial',lbl_rate:'Tasa anual de interés',lbl_years:'Años',lbl_contrib:'Aportación mensual',lbl_freq:'Frecuencia de capitalización',opt_monthly:'Mensual',opt_quarterly:'Trimestral',opt_semi:'Semestral',opt_annual:'Anual',lbl_finalBal:'Balance Final',lbl_contributed:'Total Aportado',lbl_earned:'Interés Ganado',lbl_mult:'Multiplicador',th_year:'Año',th_balance:'Balance',th_contribs:'Aportaciones',th_interest:'Interés',pdfLbl:'⬇ Descargar PDF',pdfLoading:'⏳ Cargando...',pdfError:'Error al cargar PDF.',shareLbl:'↑ Compartir',clearLbl:'🗑 Limpiar',copied:'¡Copiado!',empty:'Ingresa los valores para ver la proyección'},
  en:{title:'Compound Interest Calculator',lbl_principal:'Initial Principal',lbl_rate:'Annual Interest Rate',lbl_years:'Years',lbl_contrib:'Monthly Contribution',lbl_freq:'Compounding Frequency',opt_monthly:'Monthly',opt_quarterly:'Quarterly',opt_semi:'Semi-Annual',opt_annual:'Annual',lbl_finalBal:'Final Balance',lbl_contributed:'Total Contributed',lbl_earned:'Interest Earned',lbl_mult:'Multiplier',th_year:'Year',th_balance:'Balance',th_contribs:'Contributions',th_interest:'Interest',pdfLbl:'⬇ Download PDF',pdfLoading:'⏳ Loading...',pdfError:'PDF load error.',shareLbl:'↑ Share',clearLbl:'🗑 Clear',copied:'Copied!',empty:'Enter values to see projection'}
};
let lang='es',rows=[];

function fmt(n){return'$'+Math.round(n).toLocaleString('en-US');}

function calc(){
  const P=parseFloat(document.getElementById('principal').value)||0;
  const r=parseFloat(document.getElementById('rate').value)||0;
  const yrs=parseInt(document.getElementById('years').value)||0;
  const pmt=parseFloat(document.getElementById('contrib').value)||0;
  const n=parseInt(document.getElementById('freq').value)||12;
  if((!P&&!pmt)||!r||!yrs){
    ['finalBalance','totalContrib','totalInterest','multiplier'].forEach(id=>document.getElementById(id).textContent='—');
    document.getElementById('tblBody').innerHTML='<tr class="empty-row"><td colspan="4">'+T[lang].empty+'</td></tr>';
    rows=[];return;
  }
  const rn=r/100/n, pmtPer=pmt*12/n;
  rows=[];let bal=P;
  for(let yr=1;yr<=yrs;yr++){
    for(let p=0;p<n;p++) bal=bal*(1+rn)+pmtPer;
    const totalC=P+pmt*12*yr;
    rows.push({yr,bal,totalC,interest:bal-totalC});
  }
  const f=rows[rows.length-1];
  document.getElementById('finalBalance').textContent=fmt(f.bal);
  document.getElementById('totalContrib').textContent=fmt(f.totalC);
  document.getElementById('totalInterest').textContent=fmt(f.interest);
  const totalPut=P+pmt*12*yrs;
  document.getElementById('multiplier').textContent=(totalPut>0?(f.bal/totalPut).toFixed(2):'0')+'x';
  document.getElementById('tblBody').innerHTML=rows.map(row=>'<tr><td>'+row.yr+'</td><td>'+fmt(row.bal)+'</td><td>'+fmt(row.totalC)+'</td><td>'+fmt(row.interest)+'</td></tr>').join('');
}

function clearAll(){
  ['principal','rate','years','contrib'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('freq').selectedIndex=0;
  calc();
}

function toggleLang(){
  lang=lang==='es'?'en':'es';
  const t=T[lang];
  document.getElementById('langBtn').textContent=lang==='es'?'EN':'ES';
  document.getElementById('hdrTitle').textContent=t.title;
  ['lbl_principal','lbl_rate','lbl_years','lbl_contrib','lbl_freq','lbl_finalBal','lbl_contributed','lbl_earned','lbl_mult','th_year','th_balance','th_contribs','th_interest'].forEach(k=>{const el=document.getElementById(k);if(el)el.textContent=t[k];});
  ['opt_monthly','opt_quarterly','opt_semi','opt_annual'].forEach(k=>{const el=document.getElementById(k);if(el)el.textContent=t[k];});
  document.getElementById('pdfLbl').textContent=t.pdfLbl;
  document.getElementById('shareLbl').textContent=t.shareLbl;
  document.getElementById('clearLbl').textContent=t.clearLbl;
  calc();
}

function buildText(){
  const t=T[lang];
  const P=parseFloat(document.getElementById('principal').value)||0;
  const r=parseFloat(document.getElementById('rate').value)||0;
  const yrs=parseInt(document.getElementById('years').value)||0;
  const pmt=parseFloat(document.getElementById('contrib').value)||0;
  let txt='BETHEL FINANCIAL GROUP\n'+t.title+'\n'+'─'.repeat(36)+'\n\n';
  txt+=t.lbl_principal+': '+fmt(P)+'\n'+t.lbl_rate+': '+r+'%\n'+t.lbl_years+': '+yrs+'\n'+t.lbl_contrib+': '+fmt(pmt)+'\n\n';
  if(rows.length){const f=rows[rows.length-1];txt+=t.lbl_finalBal+': '+fmt(f.bal)+'\n'+t.lbl_contributed+': '+fmt(f.totalC)+'\n'+t.lbl_earned+': '+fmt(f.interest);}
  return txt;
}

function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}
function shareSummary(){const text=buildText();if(navigator.share){navigator.share({title:'Bethel Financial Group',text});}else{navigator.clipboard.writeText(text).then(()=>showToast(T[lang].copied)).catch(()=>{});}}

function generatePDF(){
  const{jsPDF}=window.jspdf;const doc=new jsPDF();const t=T[lang];
  const P=parseFloat(document.getElementById('principal').value)||0;
  const r=parseFloat(document.getElementById('rate').value)||0;
  const yrs=parseInt(document.getElementById('years').value)||0;
  const pmt=parseFloat(document.getElementById('contrib').value)||0;
  doc.setFillColor(15,23,42);doc.rect(0,0,210,32,'F');
  doc.setTextColor(221,184,74);doc.setFontSize(20);doc.setFont('helvetica','bold');
  doc.text('BETHEL FINANCIAL GROUP',105,13,{align:'center'});
  doc.setFontSize(10);doc.setFont('helvetica','normal');doc.text(t.title,105,23,{align:'center'});
  doc.setFillColor(221,184,74);doc.rect(0,32,210,.5,'F');
  let y=46;
  doc.setTextColor(15,23,42);doc.setFontSize(10);doc.setFont('helvetica','bold');
  doc.text(t.lbl_principal+':',14,y);doc.text(fmt(P),196,y,{align:'right'});y+=7;
  doc.text(t.lbl_rate+':',14,y);doc.text(r+'%',196,y,{align:'right'});y+=7;
  doc.text(t.lbl_years+':',14,y);doc.text(String(yrs),196,y,{align:'right'});y+=7;
  if(pmt>0){doc.text(t.lbl_contrib+':',14,y);doc.text(fmt(pmt),196,y,{align:'right'});y+=7;}
  y+=5;
  if(rows.length){
    const f=rows[rows.length-1];
    doc.setFillColor(15,23,42);doc.rect(14,y,182,14,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(13);
    doc.text(t.lbl_finalBal+':',18,y+10);doc.text(fmt(f.bal),192,y+10,{align:'right'});y+=18;
    doc.setFillColor(30,107,60);doc.rect(14,y,90,10,'F');
    doc.setFontSize(9);doc.text(t.lbl_contributed+':',18,y+7);doc.text(fmt(f.totalC),102,y+7,{align:'right'});
    doc.setFillColor(221,184,74);doc.rect(108,y,88,10,'F');
    doc.setTextColor(15,23,42);doc.text(t.lbl_earned+':',112,y+7);doc.text(fmt(f.interest),196,y+7,{align:'right'});
    y+=18;
    doc.setFillColor(15,23,42);doc.rect(14,y,182,8,'F');
    doc.setTextColor(221,184,74);doc.setFontSize(8);doc.setFont('helvetica','bold');
    doc.text(t.th_year,18,y+5.5);doc.text(t.th_balance,110,y+5.5,{align:'right'});doc.text(t.th_contribs,152,y+5.5,{align:'right'});doc.text(t.th_interest,193,y+5.5,{align:'right'});
    y+=11;doc.setFont('helvetica','normal');doc.setTextColor(15,23,42);
    rows.forEach(row=>{
      if(y>275){doc.addPage();y=20;}
      if(row.yr%2===0){doc.setFillColor(250,250,250);doc.rect(14,y-3.5,182,6,'F');}
      doc.setFontSize(9);
      doc.text(String(row.yr),18,y);doc.text(fmt(row.bal),110,y,{align:'right'});doc.text(fmt(row.totalC),152,y,{align:'right'});doc.text(fmt(row.interest),193,y,{align:'right'});
      y+=6;
    });
  }
  doc.setTextColor(150,150,150);doc.setFontSize(8);doc.setFont('helvetica','normal');
  doc.text('Bethel Financial Group — bethelfinancialgroup.com',105,290,{align:'center'});
  doc.save('Bethel_Interes_Compuesto.pdf');
}

function downloadPDF(){
  if(window.jspdf){generatePDF();return;}
  const btn=document.getElementById('pdfBtnEl');const lbl=document.getElementById('pdfLbl');const orig=lbl.textContent;
  lbl.textContent=T[lang].pdfLoading;btn.disabled=true;
  const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  s.onload=()=>{lbl.textContent=orig;btn.disabled=false;generatePDF();};
  s.onerror=()=>{lbl.textContent=orig;btn.disabled=false;alert(T[lang].pdfError);};
  document.head.appendChild(s);
}
</script>
</body>
</html>
